services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      BIND_ADDR: 0.0.0.0:8080
      DATABASE_URL: postgres://graphwar@postgres:5432/graphwar
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      DATABASE_MAX_CONNECTIONS: 10
      ALLOWED_ORIGINS: https://${DOMAIN:?set DOMAIN}
      SECURE_COOKIES: true
      SESSION_TTL_SECONDS: 2592000
      GRAPHWAR_STATIC_DIR: /app/assets/web
      RUST_LOG: graphwar_server=info,tower_http=info
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: graphwar
      POSTGRES_USER: graphwar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graphwar -d graphwar"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
